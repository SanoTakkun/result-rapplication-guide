<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>結果申請案内</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 35%),
        linear-gradient(180deg, #b00000, #2b0000);
      color: #fff;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      padding: 88px 18px 24px;
      overflow: hidden;
    }

    .app.top-mode {
      padding: 100px 18px 26px;
    }

    .logo {
      position: absolute;
      top: 90px;
      left: 34%;
      transform: translateX(-50%);
      width: 50%;
      max-width: 400px;
      z-index: 20;
      transition: 0.25s ease;
    }

    .app.top-mode .logo {
      width: 50%;
      max-width: 400px;
    }

    .girl {
      display: none;
      position: absolute;
      top: -10px;
      left: 60%;
      transform: translateX(-50%);
      width: 200%;
      max-width: 520px;
      z-index: 1;
      pointer-events: none;
    }

    .app.top-mode .girl {
      display: block;
    }

    .page {
      display: none;
      position: relative;
      z-index: 5;
      height: 100%;
      animation: fade 0.25s ease;
    }

    .page.active { display: block; }

    #top { height: 100%; }

    .top-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8;
      padding: 18px;
      border-radius: 26px;
      background: rgba(40, 0, 0, 0.48);
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 25px;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .card {
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }

    .content-page {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .desc {
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-line;
    }

    button, a.button {
      display: block;
      width: 100%;
      margin-top: 11px;
      padding: 14px 10px;
      border-radius: 16px;
      border: none;
      text-align: center;
      text-decoration: none;
      font-size: 15.5px;
      font-weight: bold;
      cursor: pointer;
    }

    .main {
      background: #fff;
      color: #8b0000;
    }

    .red {
      background: #d00000;
      color: #fff;
    }

    .sub {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.6);
    }

    .small-title {
      margin-bottom: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .language-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .language-grid button {
      margin-top: 0;
      padding: 10px 4px;
      font-size: 13px;
    }

    .language-grid button.selected {
      background: #fff;
      color: #8b0000;
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-height: 650px) {
      .app { padding-top: 70px; }
      .app.top-mode { padding-top: 78px; }

      .app.top-mode .logo { max-width: 250px; }
      .logo { max-width: 150px; }

      .girl {
        width: 78%;
        max-width: 270px;
      }

      .top-panel { padding: 14px; }

      h1 {
        font-size: 21px;
        margin-bottom: 10px;
      }

      .card { padding: 13px; }

      .desc {
        font-size: 12.5px;
        line-height: 1.45;
      }

      button, a.button {
        padding: 11px 8px;
        font-size: 13.5px;
      }

      .language-grid button {
        padding: 8px 3px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <main id="app" class="app top-mode">

    <img
      class="logo"
      src="https://livedoor.blogimg.jp/akibaguild_front/imgs/0/8/0895fa31.png?v=20250728060438"
      alt="AKIBA GUILD"
    />

    <img
      class="girl"
      src="https://livedoor.blogimg.jp/akibaguild_front/imgs/6/2/62eba478.png?v=20260625164304"
      alt="案内キャラクター"
    />

    <section id="top" class="page active">
      <div class="top-panel">
        <h1 data-i18n="title"></h1>

        <button class="main" onclick="showPage('casino')" data-i18n="casino"></button>
        <button class="main" onclick="showPage('tournament')" data-i18n="tournament"></button>

        <div class="language-grid">
          <button class="sub lang-btn" onclick="setLang('ja')">日本語</button>
          <button class="sub lang-btn" onclick="setLang('zh')">中文</button>
          <button class="sub lang-btn" onclick="setLang('ko')">한국어 </button>
          <button class="sub lang-btn" onclick="setLang('en')">English</button>
          <button class="sub lang-btn" onclick="setLang('ru')">Pусский</button>
          <button class="sub lang-btn" onclick="setLang('fr')">Français</button>
        </div>
      </div>
    </section>

    <section id="casino" class="page content-page">
      <h1 data-i18n="casino"></h1>

      <div class="card">
        <p class="desc" data-i18n="casinoDesc"></p>

        <button class="red" onclick="showPage('gameid')" data-i18n="installGameid"></button>

        <a
          class="button main"
          href="https://docs.google.com/forms/d/e/1FAIpQLSeKkE8UzytQkj0eL7XR6xmkLdHWbg1hmP7sJyYrJtRxkglCKw/viewform"
          data-i18n="depositChips"
        ></a>

        <button class="sub" onclick="showPage('top')" data-i18n="back"></button>
      </div>
    </section>

    <section id="tournament" class="page content-page">
      <h1 data-i18n="tournament"></h1>

      <div class="card">
        <p class="desc" data-i18n="tournamentDesc"></p>

        <a class="button red" href="https://pokerguild-contract.com/ja/" data-i18n="contractGuide"></a>

        <a
          class="button main"
          href="https://docs.google.com/forms/d/e/1FAIpQLSeKkE8UzytQkj0eL7XR6xmkLdHWbg1hmP7sJyYrJtRxkglCKw/viewform"
          data-i18n="resultForm"
        ></a>

        <button class="sub" onclick="showPage('top')" data-i18n="back"></button>
      </div>
    </section>

    <section id="gameid" class="page content-page">
      <h1>GameID</h1>

      <div class="card">
        <div class="small-title" data-i18n="deviceSelect"></div>

        <a class="button main" href="https://apps.apple.com/jp/app/gameid/id1553156844" data-i18n="iphoneDownload"></a>

        <a class="button main" href="https://play.google.com/store/apps/details?id=br.com.pokerweb.gameid" data-i18n="androidDownload"></a>

        <button class="sub" onclick="showPage('casino')" data-i18n="back"></button>
      </div>
    </section>

  </main>

  <script>
    let selectedLang = localStorage.getItem("lang") || "ja";

    const texts = {
      ja: {
        title: "結果申請案内",
        casino: "カジノエリア",
        tournament: "トーナメントエリア",
        casinoDesc: "チップを預けるためにはGameIDアプリをインストールし、アカウントを作成していただく必要がございます。",
        installGameid: "GameIDをインストールする",
        depositChips: "チップを預ける",
        tournamentDesc: "入賞おめでとうございます。以降の申請をするには選手契約の手続きが必要です。\n初めて入賞された場合や、入賞したことはあるけど選手契約をした覚えがないという場合は、先に手続きをお願いいたします。\n\nすでに当店で選手契約手続きがお済の場合や、GameIDの取り扱いがある他店で選手契約手続きがお済の場合は、そのまま競技結果申請フォームにお進みください。",
        contractGuide: "選手契約手続きのご案内",
        resultForm: "競技結果申請フォーム",
        deviceSelect: "使用機種の選択",
        iphoneDownload: "iPhone\nApp Store からダウンロード",
        androidDownload: "Android\nGoogle Play で手に入れよう",
        back: "戻る"
      },
      zh: {
        title: "结果申请指南",
        casino: "赌场区域",
        tournament: "锦标赛区域",
        casinoDesc: "如需寄存筹码，请先安装 GameID 应用程序并创建账户。",
        installGameid: "安装 GameID",
        depositChips: "寄存筹码",
        tournamentDesc: "恭喜您获奖。后续申请需要先完成选手合约手续。\n如果您是首次获奖，或者曾经获奖但不记得办理过选手合约，请先完成手续。\n\n如果您已在本店完成选手合约手续，或已在其他支持 GameID 的店铺完成手续，请直接进入竞技结果申请表。",
        contractGuide: "选手合约手续指南",
        resultForm: "竞技结果申请表",
        deviceSelect: "请选择您的设备",
        iphoneDownload: "iPhone\n从 App Store 下载",
        androidDownload: "Android\n在 Google Play 获取",
        back: "返回"
      },
      ko: {
        title: "결과 신청 안내",
        casino: "카지노 구역",
        tournament: "토너먼트 구역",
        casinoDesc: "칩을 맡기려면 GameID 앱을 설치하고 계정을 생성해야 합니다.",
        installGameid: "GameID 설치하기",
        depositChips: "칩 맡기기",
        tournamentDesc: "입상을 축하드립니다. 이후 신청을 진행하려면 선수 계약 절차가 필요합니다.\n처음 입상하셨거나, 입상한 적은 있지만 선수 계약을 한 기억이 없는 경우 먼저 절차를 진행해 주세요.\n\n이미 본 매장에서 선수 계약 절차를 완료했거나, GameID를 취급하는 다른 매장에서 완료한 경우에는 바로 경기 결과 신청 폼으로 진행해 주세요.",
        contractGuide: "선수 계약 절차 안내",
        resultForm: "경기 결과 신청 폼",
        deviceSelect: "사용 기기 선택",
        iphoneDownload: "iPhone\nApp Store에서 다운로드",
        androidDownload: "Android\nGoogle Play에서 받기",
        back: "돌아가기"
      },
      en: {
        title: "Result Application Guide",
        casino: "Casino Area",
        tournament: "Tournament Area",
        casinoDesc: "To deposit your chips, you need to install the GameID app and create an account.",
        installGameid: "Install GameID",
        depositChips: "Deposit Chips",
        tournamentDesc: "Congratulations on placing in the tournament. To proceed with the application, you need to complete the player contract procedure.\nIf this is your first time placing, or if you have placed before but do not remember completing the player contract, please complete the procedure first.\n\nIf you have already completed the player contract at this store, or at another store that supports GameID, please proceed directly to the result application form.",
        contractGuide: "Player Contract Guide",
        resultForm: "Result Application Form",
        deviceSelect: "Select Your Device",
        iphoneDownload: "iPhone\nDownload from the App Store",
        androidDownload: "Android\nGet it on Google Play",
        back: "Back"
      },
      ru: {
        title: "Инструкция по заявке результата",
        casino: "Зона казино",
        tournament: "Зона турнира",
        casinoDesc: "Чтобы внести фишки на хранение, необходимо установить приложение GameID и создать аккаунт.",
        installGameid: "Установить GameID",
        depositChips: "Внести фишки",
        tournamentDesc: "Поздравляем с призовым местом. Для дальнейшей подачи заявки необходимо пройти процедуру договора игрока.\nЕсли вы впервые заняли призовое место или не помните, проходили ли договор игрока, сначала завершите эту процедуру.\n\nЕсли вы уже прошли процедуру договора игрока в нашем заведении или в другом заведении, поддерживающем GameID, перейдите к форме заявки результата.",
        contractGuide: "Инструкция по договору игрока",
        resultForm: "Форма заявки результата",
        deviceSelect: "Выберите устройство",
        iphoneDownload: "iPhone\nСкачать в App Store",
        androidDownload: "Android\nСкачать в Google Play",
        back: "Назад"
      },
      fr: {
        title: "Guide de demande de résultat",
        casino: "Espace casino",
        tournament: "Espace tournoi",
        casinoDesc: "Pour déposer vos jetons, vous devez installer l’application GameID et créer un compte.",
        installGameid: "Installer GameID",
        depositChips: "Déposer des jetons",
        tournamentDesc: "Félicitations pour votre classement. Pour continuer la demande, vous devez effectuer la procédure de contrat joueur.\nSi c’est votre première fois, ou si vous ne vous souvenez pas avoir effectué cette procédure, veuillez d’abord la compléter.\n\nSi vous avez déjà effectué la procédure dans notre établissement ou dans un autre établissement compatible avec GameID, veuillez passer directement au formulaire de demande de résultat.",
        contractGuide: "Guide du contrat joueur",
        resultForm: "Formulaire de demande de résultat",
        deviceSelect: "Sélectionnez votre appareil",
        iphoneDownload: "iPhone\nTélécharger depuis l’App Store",
        androidDownload: "Android\nDisponible sur Google Play",
        back: "Retour"
      }
    };

    function setLang(lang) {
      selectedLang = lang;
      localStorage.setItem("lang", selectedLang);
      document.documentElement.lang = selectedLang;

      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.remove("selected");
      });

      const langList = ["ja", "zh", "ko", "en", "ru", "fr"];
      const index = langList.indexOf(lang);
      const buttons = document.querySelectorAll(".lang-btn");

      if (buttons[index]) {
        buttons[index].classList.add("selected");
      }

      updateTexts();
    }

    function updateTexts() {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.textContent = texts[selectedLang][key];
      });
    }

    function showPage(pageId) {
      document.querySelectorAll(".page").forEach(page => {
        page.classList.remove("active");
      });

      document.getElementById(pageId).classList.add("active");

      const app = document.getElementById("app");

      if (pageId === "top") {
        app.classList.add("top-mode");
      } else {
        app.classList.remove("top-mode");
      }

      updateTexts();
    }

    setLang(selectedLang);
  </script>
</body>
</html>
